name: Test
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (Go ${{ matrix.go-version }})
    strategy:
      fail-fast: false
      matrix:
        # "stable" is the latest Go release, "oldstable" the one before it.
        # This tracks Go's own support policy without editing the matrix.
        go-version: [oldstable, stable]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Build
        run: go build ./...
      - name: Test
        run: go test -race ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Check formatting (gofumpt)
        run: |
          unformatted=$(go tool gofumpt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::The following files are not gofumpt-formatted:"
            echo "$unformatted"
            exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Staticcheck
        run: go tool staticcheck ./...

  govulncheck:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Run govulncheck
        run: go tool govulncheck ./...
